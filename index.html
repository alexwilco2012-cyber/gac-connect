<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Offshore services. Found, vetted, booked.</title>
    <meta
      name="description"
      content="A proof-of-concept B2B marketplace for offshore energy services: vetted suppliers, in-house service lines, tier discounts, and compliance built in."
    />
    <script>
      // GitHub Pages SPA fallback decoder (pairs with public/404.html).
      // https://github.com/rafgraph/spa-github-pages — query-string route restore.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
