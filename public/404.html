<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <title>GAC Connect</title>
    <script>
      // GitHub Pages serves this for unknown paths. Re-encode the path into a
      // query string and bounce to index.html, which restores it (see index.html).
      // pathSegmentsToKeep = 1 because the site lives under /<repo-name>/.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
